TRAIN:
  ENABLE: True
  DATASET: dvs128
  BATCH_SIZE: 4
  EVAL_PERIOD: 1
  CHECKPOINT_PERIOD: 1
  AUTO_RESUME: False
  FINETUNE: True
  CHECKPOINT_FILE_PATH: ''

DATA:
  PATH_TO_DATA_DIR: ../datasets/timesformer/DVS128/manifests/user01_fluorescent_led_8f
  PATH_PREFIX: ../datasets/rpg_e2vid
  NUM_FRAMES: 8
  SAMPLING_RATE: 1
  TRAIN_JITTER_SCALES: [128, 160]
  TRAIN_CROP_SIZE: 128
  TEST_CROP_SIZE: 128
  INPUT_CHANNEL_NUM: [3]
  INV_UNIFORM_SAMPLE: True
  RANDOM_FLIP: False
  REVERSE_INPUT_CHANNEL: False

TIMESFORMER:
  ATTENTION_TYPE: 'divided_space_time'
  PRETRAINED_MODEL: ''

SOLVER:
  BASE_LR: 0.0005
  LR_POLICY: cosine
  MAX_EPOCH: 10
  MOMENTUM: 0.9
  WEIGHT_DECAY: 1e-4
  WARMUP_EPOCHS: 1.0
  WARMUP_START_LR: 0.00005
  OPTIMIZING_METHOD: sgd

MODEL:
  MODEL_NAME: vit_base_patch16_224
  NUM_CLASSES: 11
  ARCH: vit
  LOSS_FUNC: cross_entropy
  DROPOUT_RATE: 0.5

TEST:
  ENABLE: True
  DATASET: dvs128
  BATCH_SIZE: 4
  NUM_ENSEMBLE_VIEWS: 1
  NUM_SPATIAL_CROPS: 1
  CHECKPOINT_FILE_PATH: ''

DATA_LOADER:
  NUM_WORKERS: 2
  PIN_MEMORY: True

NUM_GPUS: 1
NUM_SHARDS: 1
RNG_SEED: 0
OUTPUT_DIR: outputs/dvs128_user01_finetune
